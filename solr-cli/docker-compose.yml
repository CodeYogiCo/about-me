services:
  solr:
    image: solr:9.7
    container_name: yogi-solr
    ports:
      - "8983:8983"
    environment:
      - SOLR_JAVA_MEM=-Xms512m -Xmx512m
    command: solr-precreate yogi_test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8983/solr/admin/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - solr_data:/var/solr

volumes:
  solr_data:
